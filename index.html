<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vizidiz 3D | Визуализация и Моделирование</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Updated Fonts: Manrope instead of Playfair Display -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              // We map 'serif' to Manrope to keep existing class names working, 
              // but now it gives a modern geometric look instead of a classic serif look.
              serif: ['Manrope', 'sans-serif'], 
            },
            colors: {
              accent: '#EAB308', // Updated to a cleaner, more modern Yellow/Gold (Yellow-500)
              dark: '#0f172a',
            }
          }
        }
      }
    </script>
    <style>
      body {
        background-color: #0f172a;
        color: #e2e8f0;
      }
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #1e293b;
      }
      ::-webkit-scrollbar-thumb {
        background: #475569;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #64748b;
      }

      /* === МОБИЛЬНЫЕ: Hero и Услуги === */
      @media (max-width: 768px) {
        /* 1. Hero: отменяем фиксированную высоту и даем отступы */
        #hero {
          min-height: auto !important;
          height: auto !important;
          padding-top: 140px !important;
          padding-bottom: 80px !important;
        }

        /* 2. Услуги: сдвигаем вниз, чтобы не наезжали */
        #services {
          padding-top: 60px !important;
          margin-top: 0 !important;
        }
      }

      /* === ЯКОРЯ: чтобы хедер не перекрывал заголовки === */
      #services, #portfolio, #calculator, #contact {
        scroll-margin-top: 100px;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "@google/genai": "https://esm.sh/@google/genai@^1.35.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
